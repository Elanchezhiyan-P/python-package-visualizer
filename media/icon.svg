<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Connections -->
  <line x1="8" y1="8" x2="2.5" y2="2.5" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line x1="8" y1="8" x2="13.5" y2="2.5" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line x1="8" y1="8" x2="2.5" y2="13.5" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line x1="8" y1="8" x2="13.5" y2="13.5" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
  <line x1="2.5" y1="2.5" x2="13.5" y2="2.5" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <line x1="2.5" y1="13.5" x2="13.5" y2="13.5" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <!-- Center node (root package) -->
  <circle cx="8" cy="8" r="2.4"/>
  <!-- Top-left node -->
  <circle cx="2.5" cy="2.5" r="1.6"/>
  <!-- Top-right node -->
  <circle cx="13.5" cy="2.5" r="1.6"/>
  <!-- Bottom-left node (smaller = leaf) -->
  <circle cx="2.5" cy="13.5" r="1.2"/>
  <!-- Bottom-right node (smaller = leaf) -->
  <circle cx="13.5" cy="13.5" r="1.2"/>
</svg>
